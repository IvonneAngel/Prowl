name: capture original Prowl interface atlas

on:
  workflow_dispatch:

concurrency:
  group: capture-original-interface-atlas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    name: Capture original macOS Prowl interfaces
    runs-on: macos-26
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SPM_CACHE_DIR: ${{ github.workspace }}/build/spm-cache
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup macOS toolchain
        uses: ./.github/actions/setup-macos

      - name: Build the real macOS app
        run: make build-app

      - name: Resolve built app path
        id: app-path
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild -project supacode.xcodeproj \
            -scheme supacode \
            -configuration Debug \
            -showBuildSettings \
            -json \
            -clonedSourcePackagesDirPath "$SPM_CACHE_DIR" > build/build-settings.json

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import pathlib

          settings = json.loads(pathlib.Path("build/build-settings.json").read_text())[0]["buildSettings"]
          app_path = pathlib.Path(settings["BUILT_PRODUCTS_DIR"]) / settings["FULL_PRODUCT_NAME"]
          if not app_path.exists():
              raise SystemExit(f"Built app not found: {app_path}")
          print(f"app_path={app_path}")
          PY

      - name: Capture interface atlas
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$GITHUB_WORKSPACE/build/interface-atlas"
          SCREEN_DIR="$ARTIFACT_DIR/screenshots"
          META_DIR="$ARTIFACT_DIR/metadata"
          mkdir -p "$SCREEN_DIR" "$META_DIR"

          brew list cliclick >/dev/null 2>&1 || brew install cliclick

          APP_PATH="${{ steps.app-path.outputs.app_path }}"
          CLI_PATH="$APP_PATH/Contents/Resources/prowl-cli/prowl"

          cat > "$META_DIR/manifest.jsonl" <<'EOF'
          {"note":"Screenshots are captured from the real macOS Prowl build generated by this workflow."}
          EOF

          allow_screen_capture_prompt() {
            local probe="$META_DIR/screen-permission-probe.png"
            screencapture -x -t png "$probe" >/dev/null 2>&1 || true
            sleep 1
            osascript <<'OSA' >/dev/null 2>&1 || true
          tell application "System Events"
            repeat with processName in {"CoreServicesUIAgent", "UserNotificationCenter", "SystemUIServer", "bash"}
              try
                tell process (processName as text)
                  if exists button "Allow" of window 1 then click button "Allow" of window 1
                end tell
              end try
            end repeat
          end tell
          OSA
            for attempt in 1 2 3; do
              cliclick c:512,387 >/dev/null 2>&1 || true
              sleep 1
            done
          }

          shot_index=0
          shot() {
            local slug="$1"
            local title="$2"
            shot_index=$((shot_index + 1))
            local file
            file="$(printf "%02d-%s.png" "$shot_index" "$slug")"
            osascript -e 'tell application id "com.onevcat.prowl" to activate' >/dev/null 2>&1 || true
            sleep 1
            screencapture -x -t png "$SCREEN_DIR/$file"
            python3 - "$META_DIR/manifest.jsonl" "$file" "$title" <<'PY'
          import json
          import pathlib
          import sys
          manifest = pathlib.Path(sys.argv[1])
          with manifest.open("a", encoding="utf-8") as f:
              f.write(json.dumps({"file": sys.argv[2], "title": sys.argv[3]}, ensure_ascii=True) + "\n")
          PY
          }

          key() {
            local script="$1"
            osascript -e 'tell application "System Events" to tell process "Prowl" to set frontmost to true' >/dev/null 2>&1 || true
            osascript -e "tell application \"System Events\" to $script" >/dev/null 2>&1 || true
            sleep "${2:-1}"
          }

          place_main_window() {
            osascript <<'OSA' >/dev/null 2>&1 || true
          tell application id "com.onevcat.prowl" to activate
          tell application "System Events"
            tell process "Prowl"
              set frontmost to true
              try
                set position of window 1 to {80, 60}
                set size of window 1 to {1280, 800}
              end try
            end tell
          end tell
          OSA
            sleep 1
          }

          place_settings_window() {
            osascript <<'OSA' >/dev/null 2>&1 || true
          tell application "System Events"
            tell process "Prowl"
              set frontmost to true
              try
                set position of window "Settings" to {120, 80}
                set size of window "Settings" to {940, 660}
              end try
            end tell
          end tell
          OSA
            sleep 1
          }

          dump_ax() {
            local name="$1"
            osascript <<'OSA' > "$META_DIR/$name.txt" 2>&1 || true
          tell application "System Events"
            tell process "Prowl"
              set output to ""
              repeat with w in windows
                set output to output & "WINDOW: " & (name of w as text) & " | " & (role of w as text) & linefeed
                try
                  repeat with e in UI elements of w
                    set output to output & "  " & (role of e as text) & " | " & (name of e as text) & linefeed
                  end repeat
                end try
              end repeat
              return output
            end tell
          end tell
          OSA
          }

          allow_screen_capture_prompt

          # 1. First launch: capture the real empty state before any repo is configured.
          rm -rf "$HOME/.prowl"
          open "$APP_PATH"
          place_main_window
          shot "empty-state" "First launch empty state"
          dump_ax "ax-empty-state"

          # 2. Prepare a real repo and two worktrees so sidebar/canvas/shelf have material.
          git -C "$GITHUB_WORKSPACE" config user.name "Prowl Atlas"
          git -C "$GITHUB_WORKSPACE" config user.email "prowl-atlas@example.invalid"
          git -C "$GITHUB_WORKSPACE" worktree add "$RUNNER_TEMP/prowl-atlas-agent" -b codex/atlas-agent
          git -C "$GITHUB_WORKSPACE" worktree add "$RUNNER_TEMP/prowl-atlas-review" -b codex/atlas-review
          printf "\ninterface atlas probe\n" >> "$RUNNER_TEMP/prowl-atlas-agent/README.md"

          "$CLI_PATH" open --json "$GITHUB_WORKSPACE" > "$META_DIR/cli-open-root.json" 2> "$META_DIR/cli-open-root.stderr" || true
          "$CLI_PATH" open --json "$RUNNER_TEMP/prowl-atlas-agent" > "$META_DIR/cli-open-agent.json" 2> "$META_DIR/cli-open-agent.stderr" || true
          "$CLI_PATH" open --json "$RUNNER_TEMP/prowl-atlas-review" > "$META_DIR/cli-open-review.json" 2> "$META_DIR/cli-open-review.stderr" || true
          "$CLI_PATH" send --json "printf 'Prowl interface atlas root\n'; pwd; git status --short" > "$META_DIR/cli-send-root.json" 2> "$META_DIR/cli-send-root.stderr" || true
          "$CLI_PATH" list --json > "$META_DIR/cli-list-after-open.json" 2> "$META_DIR/cli-list-after-open.stderr" || true

          place_main_window
          shot "main-worktree-terminal" "Main repository and live terminal"
          dump_ax "ax-main-worktree-terminal"

          # 3. User-facing main modes and overlays.
          key 'keystroke "p" using command down' 1
          shot "command-palette" "Command palette overlay"
          key 'key code 53' 1

          key 'key code 36 using {command down, option down}' 2
          shot "canvas-view" "Canvas view with worktree cards"

          key 'key code 36 using {command down, shift down}' 2
          shot "shelf-view" "Shelf view"

          key 'keystroke "p" using {command down, option down}' 1
          shot "active-agents-panel" "Active agents panel"

          key 'keystroke "n" using command down' 1
          shot "new-worktree-prompt" "New worktree prompt"
          key 'key code 53' 1

          key 'keystroke "y" using {command down, shift down}' 2
          shot "diff-window" "Diff window"

          # 4. Settings and settings sections.
          key 'keystroke "," using command down' 2
          place_settings_window
          shot "settings-general" "Settings: General"
          cliclick c:210,160 || true
          shot "settings-general-clicked" "Settings: General selected"
          cliclick c:210,190 || true
          shot "settings-notifications" "Settings: Notifications"
          cliclick c:210,220 || true
          shot "settings-shortcuts" "Settings: Shortcuts"
          cliclick c:210,250 || true
          shot "settings-worktree" "Settings: Worktree"
          cliclick c:210,280 || true
          shot "settings-updates" "Settings: Updates"
          cliclick c:210,310 || true
          shot "settings-advanced" "Settings: Advanced"
          cliclick c:210,340 || true
          shot "settings-github" "Settings: GitHub"
          cliclick c:210,405 || true
          shot "settings-repository" "Settings: Repository-specific"
          dump_ax "ax-settings"

          # 5. Debug-only but useful for copying internal icon language.
          osascript <<'OSA' >/dev/null 2>&1 || true
          tell application "System Events"
            tell process "Prowl"
              click menu item "Icon Catalog" of menu "Debug" of menu bar 1
            end tell
          end tell
          OSA
          sleep 2
          shot "debug-icon-catalog" "Debug icon catalog"
          dump_ax "ax-debug-icon-catalog"

          cp LICENSE "$ARTIFACT_DIR/LICENSE.original.txt"
          cp README.md "$ARTIFACT_DIR/README.original.md"
          find supacode/Features -name '*.swift' | sort > "$META_DIR/source-feature-files.txt"
          find supacode/Commands -name '*.swift' | sort > "$META_DIR/source-command-files.txt"

      - name: Upload interface atlas
        uses: actions/upload-artifact@v4
        with:
          name: Prowl-original-interface-atlas-${{ github.run_id }}
          path: build/interface-atlas
          if-no-files-found: error
          retention-days: 7
